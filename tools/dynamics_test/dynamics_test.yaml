# Mockway Robot - Real-time Torque Compensation Configuration
# 实时力矩补偿控制系统配置文件

# CAN 通信配置
can:
  port: "COM5"                # CAN适配器串口号 (Windows: COMx, Linux: /dev/ttyUSBx)
  adapter_type: "damiao"      # USB-CAN 控制器: damiao(达妙) / witmotion(维特)
  serial_baudrate: 921600     # 串口波特率（USB-CAN适配器通信）
  can_baudrate: 1000000       # CAN总线波特率

# 电机配置列表（支持多个电机）
# 逐轴调试重力补偿：仅将待测关节 compensation_enabled 设为 true，其余保持 false
# 建议顺序 J6 → J5 → J4 → J1 → J2 → J3
motors:
  - id: 1
    type: "DM_J4310_2EC"
    master_id: 0
    direction: 1
    compensation_enabled: false           # 补偿开关: true=输出重力补偿力矩
    description: "Joint 1 - Shoulder"

  - id: 2
    type: "DM4340"
    master_id: 0
    direction: 1
    compensation_enabled: true
    description: "Joint 2 - Elbow"

  - id: 3
    type: "DM4340"
    master_id: 0
    direction: -1
    compensation_enabled: true
    description: "Joint 3 - Forearm"

  - id: 4
    type: "DM_J4310_2EC"
    master_id: 0
    direction: 1
    compensation_enabled: true
    description: "Joint 4 - Wrist Pitch"

  - id: 5
    type: "DM_J4310_2EC"
    master_id: 0
    direction: 1
    compensation_enabled: true
    description: "Joint 5 - Wrist Roll"

  - id: 6
    type: "DM_J4310_2EC"
    master_id: 0
    direction: 1
    compensation_enabled: true            # 首次调试建议从 J6 开始
    description: "Joint 6 - Wrist Yaw"

# 控制参数
control:
  rate: 200                          # 控制频率 (Hz)
  compensation_mode: "gravity"       # 补偿模式: "gravity", "full_dynamics", "none"

  # MIT控制参数
  mit_params:
    kp: 0.0                          # 位置增益（纯力矩控制时设为0）
    kd: 1.0                          # 阻尼增益（首次测试建议 ≥1.0）

# 日志配置
logging:
  print_status_interval: 0.5         # 状态打印间隔（秒）
  verbose: false                     # 详细输出模式
