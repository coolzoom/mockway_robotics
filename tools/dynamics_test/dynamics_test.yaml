# Mockway Robot - Real-time Torque Compensation Configuration

# CAN 通信配置
can:
  port: "COM5"                # CAN适配器串口号 (Windows: COMx, Linux: /dev/ttyUSBx)
  adapter_type: "damiao"      # USB-CAN 控制器: damiao(达妙) / witmotion(维特)
  serial_baudrate: 921600     # 串口波特率（USB-CAN适配器通信）
  can_baudrate: 1000000       # CAN总线波特率

# 电机配置列表（支持多个电机）
# 逐轴调试：同一时间只开 ONE 个 compensation_enabled: true
# J2/J3 调试时 J1 尽量保持在零位（g(q) 依赖全臂姿态）
motors:
  - id: 1
    type: "DM_J4310_2EC"
    master_id: 0
    direction: 1
    compensation_enabled: false
    hold_kp: 50.0             # 未补偿关节：锁定启动时姿态
    description: "Joint 1 - Shoulder"

  - id: 2
    type: "DM4340"
    master_id: 0
    direction: 1              # 与 ros2_control dir=1 一致
    compensation_enabled: true
    gravity_torque_scale: 1.2       # 纯重力 g(q)：悬停支撑（motor_gui 标定）
    full_dynamics_torque_scale: 0.4 # 完整 M*a+C+g：拖动示教，抑制抖动
    description: "Joint 2 - Elbow"

  - id: 3
    type: "DM4340"
    master_id: 0
    direction: -1
    compensation_enabled: false
    hold_kp: 80.0
    hold_kd: 2.0
    description: "Joint 3 - Forearm"

  - id: 4
    type: "DM_J4310_2EC"
    master_id: 0
    direction: 1
    compensation_enabled: false
    description: "Joint 4 - Wrist Pitch"

  - id: 5
    type: "DM_J4310_2EC"
    master_id: 0
    direction: 1
    compensation_enabled: false
    description: "Joint 5 - Wrist Roll"

  - id: 6
    type: "DM_J4310_2EC"
    master_id: 0
    direction: 1
    compensation_enabled: false
    description: "Joint 6 - Wrist Yaw"

# 控制参数
control:
  rate: 100                   # 降低控制频率，减轻噪声引起的振荡
  compensation_mode: "gravity"
  torque_scale: 1.0           # 未单独指定模式倍率时的全局 fallback
  gravity_torque_scale: 1.0   # 纯重力 g(q) 全局倍率
  full_dynamics_torque_scale: 0.35  # 完整动力学全局倍率（拖动示教宜偏小）
  tau_filter_cutoff_hz: 5.0   # 补偿力矩低通 (Hz)；0=关闭
  hold_inactive_joints: true  # 未补偿关节锁定姿态，防止前臂摆动导致 g(q) 跳变
  hold_kp: 50.0               # 4310 默认保持刚度
  hold_kd: 1.0
  torque_ramp_sec: 2.0        # 补偿力矩 2s 软启动

  mit_params:
    kp: 0.0
    kd: 0.0

logging:
  print_status_interval: 0.5
  verbose: false
